<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HEY HATCH リッチメニュー設定</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:720px;margin:48px auto;padding:0 20px;line-height:1.7}
    code{background:#f3f3f3;padding:.15em .35em;border-radius:4px}
    button{font-size:18px;padding:12px 20px;border:0;border-radius:8px;background:#111;color:#fff}
    input{font-size:16px;padding:10px;width:100%;box-sizing:border-box;margin:8px 0 16px}
    .note{background:#f7f7f7;padding:16px;border-radius:10px}
  </style>
</head>
<body>
  <h1>HEY HATCH リッチメニュー設定</h1>
  <p>このページは、2枚のリッチメニューをLINEに登録するための設定ページです。</p>
  <div class="note">
    <p><strong>先に必要なもの</strong></p>
    <p><code>menu-home.png</code> と <code>menu-services.png</code> を、このリポジトリの一番上に置いてください。</p>
    <p>Vercelの環境変数も設定してから実行してください。</p>
  </div>
  <label for="key">SETUP_KEY</label>
  <input id="key" type="password" autocomplete="off">
  <button id="run">LINEへ登録する</button>
  <pre id="result"></pre>
  <script>
    const button = document.getElementById('run');
    const result = document.getElementById('result');
    button.addEventListener('click', async () => {
      const key = document.getElementById('key').value;
      result.textContent = '登録中です…';
      button.disabled = true;
      try {
        const response = await fetch('/api/setup', {
          method: 'POST',
          headers: {'content-type':'application/json'},
          body: JSON.stringify({key})
        });
        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        result.textContent = String(error);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
